<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Shooter v3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; align-items: center; justify-content: center; }
        #hud { position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; color: #0ff; font-size: 15px; font-weight: 600; text-shadow: 0 0 6px #0ff; }
        #combo-display { color: #f88; font-size: 14px; margin-top: 2px; }
        .hud-right { text-align: right; }
        #boss-hp { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; pointer-events: none; display: none; }
        #boss-hp-fill { height: 100%; background: linear-gradient(90deg, #f44, #f80); width: 100%; transition: width 0.1s; }
        #boss-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 11px; font-weight: bold; text-shadow: 0 1px 3px #000; }
        .hidden { display: none !important; }
        .panel { background: rgba(10, 10, 15, 0.92); padding: 30px 40px; border-radius: 14px; text-align: center; color: #eee; pointer-events: auto; box-shadow: 0 0 30px rgba(0, 255, 255, 0.15); min-width: 320px; border: 1px solid #333; }
        h1 { margin: 0 0 10px; color: #0ff; text-shadow: 0 0 8px #0ff; }
        p { margin: 6px 0 16px; opacity: 0.85; line-height: 1.4; }
        button { padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: 2px solid #0ff; background: transparent; color: #0ff; border-radius: 6px; transition: 0.2s; margin: 8px 4px; }
        button:hover { background: #0ff; color: #000; transform: scale(1.03); }
        button.secondary { border-color: #888; color: #888; }
        button.secondary:hover { background: #888; color: #000; }
        .lb { margin-top: 15px; border-top: 1px solid #444; padding-top: 12px; text-align: left; }
        .lb-row { display: flex; justify-content: space-between; padding: 4px 0; color: #888; font-size: 13px; }
        .lb-row:first-child { color: #0ff; font-weight: 600; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .setting-row input[type="range"] { width: 140px; accent-color: #0ff; }
        #wave-alert { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); color: #0ff; font-size: 36px; font-weight: 800; text-shadow: 0 0 15px #0ff; pointer-events: none; opacity: 0; transition: opacity 0.4s; text-align: center; }
        .controls { font-size: 12px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="boss-hp"><div id="boss-label">BOSS</div><div id="boss-hp-fill"></div></div>
    <div id="wave-alert">WAVE 1 INCOMING</div>
    <div id="ui">
        <div id="hud" class="hidden">
            <div class="hud-box">
                <div>Score: <span id="score">0</span></div>
                <div id="combo-display"></div>
                <div id="powerups" style="margin-top:4px; font-size:12px;"></div>
            </div>
            <div class="hud-box hud-right">
                Wave: <span id="wave">1</span><br>
                <button class="secondary" onclick="toggleSettings()" style="margin-top:5px; font-size:11px; padding:4px 8px;">⚙️ Settings</button>
            </div>
        </div>

        <div id="menu" class="panel">
            <h1>🔫 Wave Shooter</h1>
            <p>WASD / Arrows to move • Click to shoot<br>Collect drops • Survive & defeat bosses!</p>
            <div class="lb" id="menu-lb"></div>
            <button onclick="startGame()">Start Game</button>
            <button class="secondary" onclick="toggleSettings()">⚙️ Settings</button>
            <div class="controls">Audio starts on first interaction</div>
        </div>

        <div id="gameover" class="panel hidden">
            <h1>💥 Game Over</h1>
            <p>Score: <strong id="final-score">0</strong></p>
            <div class="lb" id="go-lb"></div>
            <button onclick="startGame()">Play Again</button>
            <button class="secondary" onclick="toggleSettings()">⚙️ Settings</button>
        </div>

        <div id="settings" class="panel hidden">
            <h1>⚙️ Settings</h1>
            <div style="max-width:260px; margin:15px auto; text-align:left; font-size:14px;">
                <div class="setting-row">🔊 Volume: <input type="range" id="s-vol" min="0" max="100" value="50"></div>
                <div class="setting-row">🌫️ Trail Opacity: <input type="range" id="s-trail" min="5" max="40" value="25"></div>
                <div class="setting-row">⚔️ Difficulty: <input type="range" id="s-diff" min="0.5" max="2.0" step="0.1" value="1.0"></div>
                <div class="setting-row" style="margin-top:12px; border-top:1px solid #444; padding-top:8px;">
                    ♾️ Permanent Power-Ups: <input type="checkbox" id="s-perm" style="accent-color:#0ff;">
                </div>
            </div>
            <button onclick="saveSettings()">Save & Close</button>
        </div>
    </div>

    <script>
        // --- SETUP ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
        window.addEventListener('resize', resize); resize();

        // --- SETTINGS ---
        const SETTINGS_KEY = 'ws_settings_v1';
        let settings = { volume: 0.5, trailOpacity: 0.25, difficulty: 1.0, permPowerups: false };
        const loadSettings = () => {
            try { Object.assign(settings, JSON.parse(localStorage.getItem(SETTINGS_KEY))); } catch {}
            document.getElementById('s-vol').value = settings.volume * 100;
            document.getElementById('s-trail').value = settings.trailOpacity * 100;
            document.getElementById('s-diff').value = settings.difficulty;
            document.getElementById('s-perm').checked = settings.permPowerups;
        };
        const saveSettings = () => {
            settings.volume = +document.getElementById('s-vol').value / 100;
            settings.trailOpacity = +document.getElementById('s-trail').value / 100;
            settings.difficulty = +document.getElementById('s-diff').value;
            settings.permPowerups = document.getElementById('s-perm').checked;
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            document.getElementById('settings').classList.add('hidden');
        };
        const toggleSettings = () => document.getElementById('settings').classList.toggle('hidden');
        loadSettings();

        // --- AUDIO SYSTEM ---
        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); };
        const playSound = (type) => {
            if (!audioCtx || settings.volume <= 0) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(settings.volume, audioCtx.currentTime);
            const n = audioCtx.currentTime;
            const setF = (f, t) => o.frequency.setValueAtTime(f, n + t);
            const rampG = (v, t) => g.gain.exponentialRampToValueAtTime(v, n + t);

            if (type === 'shoot') { o.type = 'square'; setF(800,0); setF(400,0.03); rampG(0.001,0.04); o.start(n); o.stop(n+0.04); }
            else if (type === 'machinegun') { o.type = 'sawtooth'; setF(200,0); setF(120,0.02); rampG(0.001,0.03); o.start(n); o.stop(n+0.03); }
            else if (type === 'hit') { o.type = 'triangle'; setF(180,0); setF(60,0.08); rampG(0.001,0.08); o.start(n); o.stop(n+0.08); }
            else if (type === 'powerup') { o.type = 'sine'; setF(400,0); setF(1200,0.1); rampG(0.001,0.15); o.start(n); o.stop(n+0.15); }
            else if (type === 'wave') { o.type = 'triangle'; setF(150,0); setF(350,0.2); rampG(0.001,0.25); o.start(n); o.stop(n+0.25); }
            else if (type === 'boss') { o.type = 'sawtooth'; setF(100,0); setF(250,0.3); rampG(0.001,0.4); o.start(n); o.stop(n+0.4); }
        };

        // --- LEADERBOARD ---
        const LB_KEY = 'ws_lb_v1';
        const getLB = () => { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } };
        const saveLB = (s) => { try { let lb = getLB(); lb.push({ s, d: new Date().toLocaleDateString() }); lb.sort((a,b)=>b.s-a.s); localStorage.setItem(LB_KEY, JSON.stringify(lb.slice(0,5))); } catch {} };
        const renderLB = (id) => {
            const el = document.getElementById(id), lb = getLB();
            el.innerHTML = lb.length ? lb.map((e,i) => `<div class="lb-row"><span>#${i+1}</span><span>${e.s}</span><span>${e.d}</span></div>`).join('') : `<div class="lb-row" style="color:#666">No scores yet</div>`;
        };

        // --- GAME STATE ---
        let player, bullets, enemies, powerups, score, wave, waveState, prepTimer, enemiesToSpawn, spawnInt, gameRunning, animId;
        let keys = {}, mouse = {x:0,y:0}, mouseDown = false, mgTimer = 0;
        let boss = null;
        let pUps = { rapid:0, spread:0, speed:0, shield:false, machinegun:0 };
        let activeCombo = { name: '', bonusFireRate: 1, bonusSpread: 1, bonusSpeed: 1 };

        // --- INPUT ---
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', e => {
            if (e.button === 0 && gameRunning) {
                initAudio(); mouseDown = true;
                if (pUps.machinegun <= 0) shoot(false);
            }
        });
        window.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });

        // --- CORE ---
        function initGame() {
            player = { x: canvas.width/2, y: canvas.height/2, r: 14, spd: 5.5 };
            bullets = []; enemies = []; powerups = []; score = 0; wave = 1;
            pUps = { rapid:0, spread:0, speed:0, shield:false, machinegun:0 };
            boss = null; activeCombo = { name:'', bonusFireRate:1, bonusSpread:1, bonusSpeed:1 };
            mgTimer = 0; gameRunning = true;
            document.getElementById('score').textContent = '0';
            document.getElementById('wave').textContent = '1';
            document.getElementById('boss-hp').style.display = 'none';
            updatePUI();
        }

        function startWave() {
            waveState = 'prep'; prepTimer = 80;
            const base = Math.floor((5 + wave * 3) * settings.difficulty);
            enemiesToSpawn = base;
            const alert = document.getElementById('wave-alert');
            alert.innerHTML = `WAVE ${wave}<br><span style="font-size:0.6em">Incoming: ${base} enemies</span>`;
            alert.style.opacity = '1';
            playSound('wave');
            if (wave % 5 === 0) setTimeout(spawnBoss, 2500);
        }

        function spawnEnemy() {
            const r = Math.random() * 12 + 10;
            let x, y;
            if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -r : canvas.width + r; y = Math.random() * canvas.height; }
            else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -r : canvas.height + r; }
            const ang = Math.atan2(player.y - y, player.x - x);
            const spd = (1.2 + Math.random() * 1.2 + (wave * 0.15)) * settings.difficulty;
            enemies.push({ x, y, r, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, col: `hsl(${Math.random()*360}, 60%, 50%)`, type: 'normal' });
        }

        function spawnBoss() {
            if (!gameRunning || wave % 5 !== 0) return;
            const bx = Math.random() < 0.5 ? 100 : canvas.width - 100;
            boss = { x: bx, y: -60, r: 35, hp: 50 + wave * 15, maxHp: 50 + wave * 15, spd: 1.2, shootTimer: 0, type: 'boss' };
            document.getElementById('boss-hp').style.display = 'block';
            document.getElementById('boss-hp-fill').style.width = '100%';
            document.getElementById('boss-label').textContent = `BOSS WAVE ${wave}`;
            playSound('boss');
        }

        function shootEnemyBullet() {
            if (!boss) return;
            const ang = Math.atan2(player.y - boss.y, player.x - boss.x);
            const spread = 3;
            for(let i=0; i<spread; i++) {
                const off = (i-1)*0.3;
                bullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang+off)*5, vy: Math.sin(ang+off)*5, r: 6, col: '#f44', owner: 'enemy' });
            }
        }

        function spawnPowerUp(x, y) {
            if (Math.random() > 0.3) return;
            const types = ['rapid', 'spread', 'speed', 'machinegun', 'shield'];
            const type = types[Math.floor(Math.random() * types.length)];
            const colMap = { rapid:'#f0f', spread:'#ff0', speed:'#0f0', machinegun:'#f44', shield:'#0ff' };
            powerups.push({ x, y, type, r: 13, col: colMap[type], pulse: Math.random() * 6 });
        }

        function shoot(isMachine) {
            const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            const baseSpd = (isMachine ? 10 : 12) * activeCombo.bonusSpeed;
            const baseSpread = (isMachine ? 5 : 3) * activeCombo.bonusSpread;
            const arc = 0.18;
            const count = Math.ceil(baseSpread);
            for(let i=0; i<count; i++) {
                const off = count > 1 ? (i - (count-1)/2) * arc : 0;
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(ang+off)*baseSpd, vy: Math.sin(ang+off)*baseSpd, r: isMachine ? 3 : 4, col: isMachine ? '#faa' : '#fff', owner: 'player' });
            }
        }

        // --- COMBOS ---
        function recalcCombos() {
            let names = [], fr = 1, sp = 1, bs = 1;
            const has = (k) => settings.permPowerups ? (pUps[k]===true) : (typeof pUps[k]==='number' && pUps[k] > 0);
            if (has('rapid')) { fr *= 0.5; names.push('Rapid'); }
            if (has('spread')) { sp += 1.5; names.push('Spread'); }
            if (has('speed')) { bs += 0.4; names.push('Speed'); }
            if (has('machinegun')) { names.push('MGun'); }
            
            let comboName = '';
            if (has('machinegun') && has('rapid')) { comboName = '🔥 VULCAN'; fr *= 0.6; }
            else if (has('machinegun') && has('spread')) { comboName = '💥 SHOTGUN'; sp += 2; }
            else if (names.length >= 3) { comboName = '👑 OMNI'; fr *= 0.8; sp += 1; bs += 0.2; }  // ✅ FIXED: Added braces
            else if (names.length === 2) comboName = `⚡ ${names.join(' + ')}`;
            
            activeCombo = { name: comboName, bonusFireRate: fr, bonusSpread: sp, bonusSpeed: bs };
        }

        // --- UPDATE ---
        function update() {
            // Movement
            const s = player.spd * (activeCombo.bonusSpeed * 0.7);
            const moveSpd = has('speed') ? s * 1.6 : s;
            const has = (k) => settings.permPowerups ? (pUps[k]===true) : (typeof pUps[k]==='number' && pUps[k] > 0);
            if (keys['w'] || keys['arrowup']) player.y -= moveSpd;
            if (keys['s'] || keys['arrowdown']) player.y += moveSpd;
            if (keys['a'] || keys['arrowleft']) player.x -= moveSpd;
            if (keys['d'] || keys['arrowright']) player.x += moveSpd;
            player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
            player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

            // Wave prep/spawn
            if (waveState === 'prep' && --prepTimer <= 0) {
                waveState = 'active';
                document.getElementById('wave-alert').style.opacity = '0';
                let spawned = 0;
                spawnInt = setInterval(() => {
                    if (!gameRunning || spawned >= enemiesToSpawn) return clearInterval(spawnInt);
                    spawnEnemy(); spawned++;
                }, 400);
            }

            // Machine Gun & Timers
            if (has('machinegun') && mouseDown) {
                if (mgTimer <= 0) { shoot(true); playSound('machinegun'); mgTimer = Math.max(2, Math.ceil(4 * activeCombo.bonusFireRate)); }
            } else mgTimer = 0;
            if (mgTimer > 0) mgTimer--;
            if (!settings.permPowerups) {
                for(let k in pUps) if (typeof pUps[k]==='number' && pUps[k]>0) pUps[k]--;
            }
            recalcCombos();
            updatePUI();

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.x += b.vx; b.y += b.vy;
                if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) { bullets.splice(i, 1); continue; }
                if (b.owner === 'enemy' && Math.hypot(b.x-player.x, b.y-player.y) < player.r + b.r) {
                    if (!has('shield')) { endGame(); return; }
                    pUps.shield = settings.permPowerups; bullets.splice(i, 1); playSound('hit');
                }
            }

            // Boss Logic
            if (boss) {
                if (boss.y < 120) boss.y += 2;
                else {
                    boss.x += Math.sin(Date.now()/800) * 1.5;
                    boss.shootTimer++;
                    if (boss.shootTimer >= 100) { shootEnemyBullet(); boss.shootTimer = 0; }
                }
                document.getElementById('boss-hp-fill').style.width = `${(boss.hp/boss.maxHp)*100}%`;
            }

            // Powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i]; p.pulse += 0.1;
                if (Math.hypot(p.x-player.x, p.y-player.y) < p.r + player.r) {
                    playSound('powerup');
                    if (p.type === 'shield') pUps.shield = true;
                    else pUps[p.type] = settings.permPowerups ? true : 360;
                    powerups.splice(i, 1);
                }
            }

            // Enemies & Collisions
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i]; e.x += e.vx; e.y += e.vy;
                const distP = Math.hypot(e.x - player.x, e.y - player.y);
                if (distP < e.r + player.r) {
                    if (!has('shield')) { endGame(); return; }
                    pUps.shield = false; enemies.splice(i, 1); enemiesToSpawn--; playSound('hit'); continue;
                }
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (bullets[j].owner === 'enemy') continue;
                    if (Math.hypot(e.x - bullets[j].x, e.y - bullets[j].y) < e.r + bullets[j].r) {
                        playSound('hit'); spawnPowerUp(e.x, e.y);
                        enemies.splice(i, 1); bullets.splice(j, 1);
                        score += 10; document.getElementById('score').textContent = score;
                        if (--enemiesToSpawn <= 0 && !boss) { wave++; document.getElementById('wave').textContent = wave; startWave(); }
                        break;
                    }
                }
            }

            // Boss Hit Detection
            if (boss) {
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (bullets[j].owner === 'enemy') continue;
                    if (Math.hypot(boss.x - bullets[j].x, boss.y - bullets[j].y) < boss.r + bullets[j].r) {
                        bullets.splice(j, 1); boss.hp -= 1;
                        if (boss.hp <= 0) {
                            score += 200 + wave * 20; document.getElementById('score').textContent = score;
                            playSound('hit');
                            spawnPowerUp(boss.x - 20, boss.y); spawnPowerUp(boss.x + 20, boss.y);
                            if (settings.permPowerups) pUps.shield = true;
                            boss = null; document.getElementById('boss-hp').style.display = 'none';
                            wave++; document.getElementById('wave').textContent = wave; startWave();
                        }
                        break;
                    }
                }
            }
        }

        function updatePUI() {
            let h = '';
            const fmt = (k, c, t) => `<span class="p-tag" style="background:${c}; padding:2px 6px; border-radius:4px; font-size:12px; margin-right:5px; color:#000">${t}</span>`;
            if (settings.permPowerups ? (pUps.rapid===true) : (pUps.rapid>0)) h += fmt('rapid','#f0f','⚡ Rapid');
            if (settings.permPowerups ? (pUps.spread===true) : (pUps.spread>0)) h += fmt('spread','#ff0','🔸 Spread');
            if (settings.permPowerups ? (pUps.speed===true) : (pUps.speed>0)) h += fmt('speed','#0f0','💨 Speed');
            if (settings.permPowerups ? (pUps.machinegun===true) : (pUps.machinegun>0)) h += fmt('machinegun','#f44','🔥 MGun');
            if (pUps.shield) h += fmt('shield','#0ff','🛡️ Shield');
            document.getElementById('powerups').innerHTML = h;
            document.getElementById('combo-display').textContent = activeCombo.name ? `✨ ${activeCombo.name} x${activeCombo.bonusSpread.toFixed(1)}` : '';
        }

        // --- DRAW ---
        function draw() {
            ctx.fillStyle = `rgba(5,5,5,${settings.trailOpacity})`; ctx.fillRect(0,0,canvas.width,canvas.height);

            // Player
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
            ctx.fillStyle = pUps.shield ? '#0f0' : '#0ff'; ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 15; ctx.fill(); ctx.shadowBlur = 0;
            if (pUps.shield) { ctx.beginPath(); ctx.arc(player.x, player.y, player.r+8, 0, Math.PI*2); ctx.strokeStyle='rgba(0,255,0,0.5)'; ctx.lineWidth=2; ctx.stroke(); }

            // Bullets
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = b.col; ctx.shadowColor=b.col; ctx.shadowBlur=4; ctx.fill(); ctx.shadowBlur=0; });
            
            // Enemies
            enemies.forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fillStyle = e.col; ctx.fill(); });

            // Boss
            if (boss) {
                ctx.save(); ctx.translate(boss.x, boss.y);
                ctx.beginPath(); ctx.arc(0, 0, boss.r, 0, Math.PI*2); ctx.fillStyle = '#a0a'; ctx.shadowColor='#a0a'; ctx.shadowBlur=20; ctx.fill(); ctx.shadowBlur=0;
                ctx.beginPath(); ctx.arc(0, 0, boss.r * 0.7, 0, Math.PI*2); ctx.fillStyle = '#f0f'; ctx.fill();
                ctx.restore();
            }

            // Powerups
            powerups.forEach(p => {
                const sz = p.r + Math.sin(p.pulse)*2;
                ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI*2); ctx.fillStyle = p.col; ctx.shadowColor=p.col; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
                ctx.fillStyle='#000'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(p.type[0].toUpperCase(), p.x, p.y);
            });
        }

        function loop() {
            if (!gameRunning) return;
            update(); draw();
            animId = requestAnimationFrame(loop);
        }

        function startGame() {
            initAudio(); initGame();
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameover').classList.add('hidden');
            document.getElementById('settings').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            renderLB('menu-lb'); renderLB('go-lb');
            startWave(); loop();
        }

        function endGame() {
            gameRunning = false; cancelAnimationFrame(animId);
            saveLB(score);
            document.getElementById('final-score').textContent = score;
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('boss-hp').style.display = 'none';
            document.getElementById('gameover').classList.remove('hidden');
            renderLB('go-lb');
        }

        renderLB('menu-lb'); renderLB('go-lb');
    </script>
</body>
</html>
